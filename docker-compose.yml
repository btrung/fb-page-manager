# =============================================
# DEVELOPMENT — hot reload, ports expose ra ngoài
# Dùng: docker compose up
# =============================================

name: fb-page-manager

services:

  # Dùng pgvector/pgvector:pg16 để hỗ trợ vector similarity search
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fbpagemanager
      POSTGRES_USER: fbadmin
      POSTGRES_PASSWORD: fbpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fbadmin -d fbpagemanager"]
      interval: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  # Vector DB cho image embeddings (CLIP) và product search
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://fbadmin:fbpassword@postgres:5432/fbpagemanager
      - AI_SERVICE_URL=http://ai-service:8000
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Worker riêng — xử lý crawl + embedding jobs từ BullMQ queue
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["node", "workers/index.js"]
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://fbadmin:fbpassword@postgres:5432/fbpagemanager
      - AI_SERVICE_URL=http://ai-service:8000
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    volumes:
      - ./ai-service:/app
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - ./ai-service/.env
    depends_on:
      - qdrant
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
