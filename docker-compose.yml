# =============================================
# DEVELOPMENT — hot reload, ports expose ra ngoài
# Dùng: docker compose up
# =============================================

name: fb-page-manager

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fbpagemanager
      POSTGRES_USER: fbadmin
      POSTGRES_PASSWORD: fbpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fbadmin -d fbpagemanager"]
      interval: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - /app/node_modules   # giữ node_modules trong container
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://fbadmin:fbpassword@postgres:5432/fbpagemanager
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    volumes:
      - ./ai-service:/app
      - ai_chroma_data:/app/chroma_data
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    restart: unless-stopped

volumes:
  redis_data:
  ai_chroma_data:
  postgres_data:
