# =============================================
# Render.com — Infrastructure as Code
# Deploy: https://dashboard.render.com/select-repo
#
# Services:
#  1. backend   — Node.js API + React static
#  2. worker    — BullMQ crawl + embedding workers
#  3. ai-service — Python Gemini + CLIP
#  4. redis     — BullMQ queue + session store
#  5. postgres  — PostgreSQL 16 với pgvector
#
# Qdrant (vector DB) dùng Qdrant Cloud free tier (external):
#  → Tạo free cluster tại: https://cloud.qdrant.io
#  → Điền QDRANT_URL và QDRANT_API_KEY vào Render Dashboard
# =============================================

services:

  # =========================================
  # 1. BACKEND (API + serve React build)
  # =========================================
  - type: web
    name: fb-page-manager
    runtime: node
    buildCommand: |
      cd frontend && npm install --include=dev && npm run build
      cd ../backend && npm install --only=production
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production

      # Facebook App — điền trong Render Dashboard
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false

      # Sau khi deploy: https://<service-name>.onrender.com
      - key: FACEBOOK_CALLBACK_URL
        sync: false   # https://fb-page-manager.onrender.com/auth/facebook/callback
      - key: FRONTEND_URL
        sync: false   # https://fb-page-manager.onrender.com

      - key: SESSION_SECRET
        generateValue: true

      # Tự lấy từ Redis service bên dưới
      - key: REDIS_URL
        fromService:
          type: redis
          name: fb-page-manager-redis
          property: connectionString

      # URL của ai-service sau khi deploy xong
      - key: AI_SERVICE_URL
        sync: false   # https://fb-page-manager-ai.onrender.com

      # Tự lấy từ PostgreSQL database bên dưới
      - key: DATABASE_URL
        fromDatabase:
          name: fb-page-manager-db
          property: connectionString

      # Webhook FB (optional)
      - key: FB_WEBHOOK_VERIFY_TOKEN
        sync: false

  # =========================================
  # 2. WORKER (BullMQ background workers)
  #    Cùng code backend, khác start command
  # =========================================
  - type: worker
    name: fb-page-manager-worker
    runtime: node
    buildCommand: cd backend && npm install --only=production
    startCommand: cd backend && node workers/index.js
    envVars:
      - key: NODE_ENV
        value: production

      - key: REDIS_URL
        fromService:
          type: redis
          name: fb-page-manager-redis
          property: connectionString

      - key: DATABASE_URL
        fromDatabase:
          name: fb-page-manager-db
          property: connectionString

      # URL của ai-service
      - key: AI_SERVICE_URL
        sync: false   # https://fb-page-manager-ai.onrender.com

  # =========================================
  # 3. AI SERVICE (Python — Gemini + CLIP)
  # =========================================
  - type: web
    name: fb-page-manager-ai
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: HOST
        value: 0.0.0.0

      # Google Gemini — https://aistudio.google.com/app/apikey
      - key: GEMINI_API_KEY
        sync: false
      - key: VISION_MODEL
        value: gemini-1.5-flash
      - key: EMBEDDING_MODEL
        value: models/text-embedding-004

      # Qdrant Cloud — https://cloud.qdrant.io (free 1GB)
      # Sau khi tạo cluster: copy URL dạng https://xxx.qdrant.io:6333
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # =========================================
  # 4. REDIS
  # =========================================
  - type: redis
    name: fb-page-manager-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:

  # =========================================
  # 5. POSTGRESQL 16 (có pgvector extension)
  # =========================================
  - name: fb-page-manager-db
    plan: free
    databaseName: fbpagemanager
    user: fbadmin
