# =============================================
# Render.com — Free Tier (no credit card needed for these services)
# Services:
#  1. backend   — Node.js API + React + in-process background jobs
#  2. ai-service — Python Gemini
#  3. redis     — session store
#  4. postgres  — PostgreSQL 16 với pgvector
# =============================================

services:

  # =========================================
  # 1. BACKEND
  # =========================================
  - type: web
    name: fb-page-manager
    runtime: node
    buildCommand: |
      cd frontend && npm install --include=dev && npm run build
      cd ../backend && npm install --only=production
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production

      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true

      - key: REDIS_URL
        fromService:
          type: redis
          name: fb-page-manager-redis
          property: connectionString

      - key: AI_SERVICE_URL
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: fb-page-manager-db
          property: connectionString

  # =========================================
  # 2. AI SERVICE
  # =========================================
  - type: web
    name: fb-page-manager-ai
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: GEMINI_API_KEY
        sync: false
      - key: VISION_MODEL
        value: gemini-1.5-flash
      - key: EMBEDDING_MODEL
        value: models/text-embedding-004
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # =========================================
  # 3. REDIS (session store)
  # =========================================
  - type: redis
    name: fb-page-manager-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: fb-page-manager-db
    plan: free
    databaseName: fbpagemanager
    user: fbadmin
