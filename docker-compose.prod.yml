# =============================================
# PRODUCTION — nginx reverse proxy
# Dùng: docker compose -f docker-compose.prod.yml up -d
# =============================================

name: fb-page-manager

services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: fbpagemanager
      POSTGRES_USER: fbadmin
      POSTGRES_PASSWORD: fbpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fbadmin -d fbpagemanager"]
      interval: 10s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - DATABASE_URL=postgresql://fbadmin:fbpassword@postgres:5432/fbpagemanager
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["node", "workers/index.js"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - DATABASE_URL=postgresql://fbadmin:fbpassword@postgres:5432/fbpagemanager
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always

  ai-service:
    build: ./ai-service
    environment:
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - ./ai-service/.env
    depends_on:
      - qdrant
    restart: always

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
