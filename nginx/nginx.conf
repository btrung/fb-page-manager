# Rate limiting — chặn spam, bảo vệ API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

upstream backend {
    server backend:5000;
}

server {
    listen 80;
    server_name _;

    # Gzip — giảm băng thông ~70%
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Timeout
    proxy_connect_timeout 60s;
    proxy_read_timeout    60s;

    # Headers chuẩn cho proxy
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # =========================================
    # API + Auth — rate limited
    # =========================================
    location ~ ^/(api|auth)/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://backend;
    }

    # =========================================
    # Static assets — cache dài
    # =========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf)$ {
        proxy_pass http://backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # =========================================
    # Mọi route còn lại → React SPA
    # =========================================
    location / {
        proxy_pass http://backend;
    }
}
